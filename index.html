<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muniverse Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #c0c0c0;
            margin-bottom: 24px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 32px;
        }
        a {
            color: #ffd700;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid #ffd700;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        a:hover {
            background: #ffd700;
            color: #1a1a2e;
        }
        .game {
            margin-top: 40px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .game h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #ffd700;
        }
        .contact {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Muniverse Studio</h1>
        <p>Independent game studio crafting idle-tycoon experiences for mobile.</p>

        <div class="game">
            <h2>Electricity Tycoon</h2>
            <p>Build your electricity empire from a childhood bedroom to a national grid operator.</p>
            <div class="links">
                <a href="https://munkun.github.io/electricity-tycoon-privacy/">Privacy Policy</a>
                <a href="https://munkun.github.io/electricity-tycoon-privacy/delete-account.html">Delete Account</a>
            </div>
        </div>

        <p class="contact">
            Contact: <a href="mailto:muniversestudio@gmail.com" style="padding: 0; border: none; font-weight: normal;">muniversestudio@gmail.com</a>
        </p>
    </div>
</body>
</html>
